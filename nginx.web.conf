server {
    listen 8080;
    server_name _;

    # Match Fastify multipart limit (250 MB) for file uploads
    client_max_body_size 250M;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API reverse proxy — routes /api/ to the API service
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_cookie_path / /;
    }

    # Health endpoint for Cloud Run
    location /health {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
    }

    # Static assets with long cache
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # The SPA shell must revalidate so browsers pick up new hashed chunks after deploys.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files $uri $uri/ /index.html;
    }
}
